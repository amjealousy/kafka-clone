syntax = "proto3";

package datatypes;


option go_package = "kafka-clone/server/datatypes";

message ConsumePayload {
  string topic_name = 1;
  uint64 start_offset = 2;
  uint64 fin_offset = 3;
  optional bool startFlag = 4;
  optional bool endFlag = 5;
}

message ConsumeResponse {
  int64 timestamp = 1;
  uint64 offset = 2;
  bytes msg = 3;
}

message ConsumeResponseList {
  repeated ConsumeResponse responses = 1;
}