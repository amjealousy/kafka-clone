syntax = "proto3";

package datatypes;


option go_package = "kafka-clone/server/datatypes";

message ProducePayload{
  string topic_name = 1;
  string key = 2;
  bytes msg =3;
}
message ProduceResponse{
  KafkaStatus status = 1;
  optional string status_message = 2;
}
enum KafkaStatus{
  Accepted = 0;
  Error = 1;
}
